name: CI Test
on:
  push:
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '${{'
          cache: maven
      - name: Install dependencies
        run: |
          mvn dependency:go-offline -q
      - name: Run tests
        run: |
          mvn test -q
